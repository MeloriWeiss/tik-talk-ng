<div class="chats-filters-input__wrapper">
  <tt-form-input [formControl]="filterChatsControl" placeholder="Искать...">
    <svg icon="search" class="search-input-icon svg18"></svg>
  </tt-form-input>
</div>

<div class="chats-wrapper scrollbar scroll-hidden" scrollBlock [diff]="1">
  @for (chat of filteredChats(); track chat.id) {
    <button
      chats
      [chat]="chat"
      [routerLink]="[chat.id]"
      routerLinkActive="active"
    ></button>
  }
</div>
