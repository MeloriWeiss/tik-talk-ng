<tt-base-modal>
  <p class="confirmation-text">{{ title() }}</p>
  <div class="modal-btns">
    <button
      class="btn btn-transparent"
      type="button"
      (click)="confirm(false)"
    >{{ rejectBtnText() }}
    </button>
    <button
      class="btn"
      type="button"
      (click)="confirm(true)"
    >{{ agreeBtnText() }}
    </button>
  </div>
</tt-base-modal>
