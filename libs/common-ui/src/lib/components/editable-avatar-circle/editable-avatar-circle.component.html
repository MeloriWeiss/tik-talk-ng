<button
  #avatar
  (click)="onAvatarClick()"
  class="non-visible-btn change-avatar-btn"
  [class.pointer]="canEdit()"
>
  <ng-content select="[avatar]"></ng-content>
</button>

@if (canEdit() && isMouseOver()) {
  <tt-portal [host]="avatar">
    <ng-content select="[tooltip]"></ng-content>
  </tt-portal>
}

<input
  #fileInput
  (change)="onUploadImage($event)"
  type="file"
  class="d-none"
>
