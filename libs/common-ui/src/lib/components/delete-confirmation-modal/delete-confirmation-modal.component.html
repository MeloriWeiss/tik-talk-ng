<tt-base-modal>
  <p class="confirmation-text">Уверены, что хотите удалить?</p>
  <div class="modal-btns">
    <button
      class="btn btn-transparent"
      type="button"
      (click)="confirm(false)"
    >Отмена
    </button>
    <button
      class="btn"
      type="button"
      (click)="confirm(true)"
    >Удалить
    </button>
  </div>
</tt-base-modal>
