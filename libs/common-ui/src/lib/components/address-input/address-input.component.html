<input
  [formControl]="innerSearchControl"
  type="text"
  class="tt-form-input full-column"
>
@if (suggestions$ | async; as suggestions) {
  @if (isDropdownOpened()) {
    <tt-address-input-dropdown
      (clickOutside)="closeDropdown()"
      [suggestions]="suggestions"
      (suggestionPick)="onSuggestionPick($event)"
    ></tt-address-input-dropdown>
  }
}

<div [formGroup]="addressForm" class="three-columns">
  <label class="tt-form-label">
    <span>Город</span>
    <input
      formControlName="city"
      type="text"
      class="tt-form-input"
    >
  </label>
  <label class="tt-form-label">
    <span>Улица</span>
    <input
      formControlName="street"
      type="text"
      class="tt-form-input"
    >
  </label>
  <label class="tt-form-label">
    <span>Дом</span>
    <input
      formControlName="building"
      type="text"
      class="tt-form-input"
    >
  </label>
</div>
