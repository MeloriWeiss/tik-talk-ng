@if (suggestions(); as suggestions) {
  <div class="popup-wrapper">
    <div class="suggest-btns">
      @for (suggest of suggestions; track suggest.value) {
        <button
          type="button"
          class="suggest-btn"
          (click)="onSuggestionPick(suggest)"
        >
          <span class="suggest-btn__inner-wrapper">
            {{ suggest.value }}
          </span>
        </button>
      }
    </div>
  </div>
}
