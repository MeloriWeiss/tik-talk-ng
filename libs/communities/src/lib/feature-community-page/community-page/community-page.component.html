@if (community(); as community) {
  <tt-community-banner
    [bannerUrl]="community.bannerUrl"
    [isMyCommunity]="isMyCommunity()"
  ></tt-community-banner>

  <header class="community-header">
    <div class="community_avatar-name">
      <tt-editable-avatar-circle
        [canEdit]="isMyCommunity()"
        (fileLoaded)="onFileLoaded($event)"
      >
        <tt-avatar-circle
          [avatarUrl]="community.avatarUrl"
          [defaultAvatarUrl]="defaultAvatarUrl"
          class="size70"
          avatar
        ></tt-avatar-circle>
        <tt-change-photo-tooltip
          tooltip
          class="mt5"
        ></tt-change-photo-tooltip>
      </tt-editable-avatar-circle>
      <span class="community-name">{{ community.name }}</span>
    </div>

    @if (isMyCommunity()) {
      <button class="btn to-settings-btn" (click)="openEditCommunityModal()">
        Редактировать
        <svg icon="settings" class="to-settings-icon"></svg>
      </button>
    } @else {
      <tt-subscribe-btn
        [isJoined]="isJoined()"
        [communityId]="community.id"
        (changeJoinStatus)="changeJoinStatus($event)"
      ></tt-subscribe-btn>
    }
  </header>

  <main class="community-body">
    <tt-post-feed
      ttScrollBlock
      [bottomPaddingSize]="2"
      [posts]="posts()"
      [avatarUrl]="community.avatarUrl"
      [defaultAvatarUrl]="defaultAvatarUrl"
      [canCreatePosts]="isMyCommunity()"
      (createdPost)="createPost($event)"
      class="scrollbar scroll-hidden"
    ></tt-post-feed>

    <aside class="aside-info">
      <tt-subscribers-block [subscribers]="subscribers()" (addSubscribers)="shareCommunity()"></tt-subscribers-block>

      <tt-labeled-tags title="Тема" [tags]="community.themes"></tt-labeled-tags>

      <tt-labeled-text title="Описание" [text]="community.description"></tt-labeled-text>
    </aside>
  </main>
}
