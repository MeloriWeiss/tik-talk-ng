<form class="communities-search-form" [formGroup]="searchForm">
  <tt-labeled-form-field-wrapper label="Название сообщества">
    <tt-form-input formControlName="name">
      <svg icon="search" class="search-input-icon svg18" rightIcon></svg>
    </tt-form-input>
  </tt-labeled-form-field-wrapper>

  <tt-labeled-form-field-wrapper label="Тема">
    <tt-multi-select formControlName="theme" [options]="communitiesThemes" class="scrollable">
      @for (option of communitiesThemes; track option.value) {
        <tt-multi-select-option [name]="option.name" [value]="option.value"></tt-multi-select-option>
      }
    </tt-multi-select>
  </tt-labeled-form-field-wrapper>

  <tt-labeled-form-field-wrapper label="Теги">
    <tt-badges-input formControlName="tags" placeholder="Введите" class="scrollable"></tt-badges-input>
  </tt-labeled-form-field-wrapper>
</form>
