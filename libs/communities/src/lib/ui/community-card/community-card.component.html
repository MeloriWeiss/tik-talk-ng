@if (community(); as community) {
  <div class="community-card">
    <a [routerLink]="['/communities', community.id]" class="avatar-name">
      <tt-avatar-circle [avatarUrl]="community.avatarUrl" class="size70"></tt-avatar-circle>
      <div class="community-card__name">
        <strong class="h6">{{ community.name }}</strong>
        <span class="regular">{{ subscribersAmount() | endingMasculineWord : 'подписчик' }}</span>
      </div>
    </a>

    <div class="community-card__tags">
      @for (skill of community.tags; track skill) {
        <div class="badge-tag">{{ skill }}</div>
      }
    </div>

    <div class="community-card__action-btns">
      @if (community.admin.id !== me()?.id) {
        <tt-subscribe-btn
          [isJoined]="isJoined()"
          [communityId]="community.id"
          (changeJoinStatus)="changeJoinStatus($event)"
        ></tt-subscribe-btn>
      }

      <a [routerLink]="['/communities', community.id]" class="btn btn-icon">
        <svg icon="redirect-arrow" class="svg16"></svg>
      </a>
    </div>
  </div>
}
