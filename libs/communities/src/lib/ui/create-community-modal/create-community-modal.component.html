<tt-base-modal>
  <form class="modal" [formGroup]="communityForm" (ngSubmit)="submitForm()">
    <tt-labeled-form-field-wrapper label="Название сообщества">
      <tt-form-input
        formControlName="name"
      >
        <span errorMessage>Название должно содержать не менее 5 символов</span>
      </tt-form-input>
    </tt-labeled-form-field-wrapper>

    <tt-labeled-form-field-wrapper label="Тема">
      <tt-multi-select
        formControlName="themes"
        [options]="communitiesThemes"
      >
        @for (option of communitiesThemes; track option.value) {
          <tt-multi-select-option [name]="option.name" [value]="option.value"></tt-multi-select-option>
        }
        <span errorMessage>Выберите минимум одну тему</span>
      </tt-multi-select>
    </tt-labeled-form-field-wrapper>

    <tt-labeled-form-field-wrapper label="Теги">
      <tt-badges-input
        formControlName="tags"
        placeholder="Введите"
      >
        <span errorMessage>Введите минимум один тег</span>
      </tt-badges-input>
    </tt-labeled-form-field-wrapper>

    <tt-labeled-form-field-wrapper label="Описание">
      <tt-main-textarea
        formControlName="description"
        placeholder="Введите"
        rows="4"
        class="bordered"
      ></tt-main-textarea>
    </tt-labeled-form-field-wrapper>

    <div class="modal-actions">
      @if (deletable()) {
        <button
          class="btn btn-transparent btn-icon"
          type="button"
          (click)="deleteCommunity()"
        >
          <svg icon="trash" class="svg16 trash-icon"></svg>
        </button>
      }
      <div class="modal-primary-btns">
        <button
          class="btn btn-transparent"
          type="button"
          (click)="closeModal()"
        >Отмена
        </button>
        <button class="btn">Сохранить</button>
      </div>
    </div>
  </form>
</tt-base-modal>
