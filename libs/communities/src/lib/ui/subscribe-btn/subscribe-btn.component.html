@if (isJoined()) {
  <button class="btn btn-transparent" (click)="leaveCommunity()">
    Отписаться
  </button>
} @else {
  <button class="btn btn-text-icon" (click)="joinCommunity()">
    <div class="btn-hover-icon-container">
      <svg icon="signin" class="svg16 btn-hover-icon"></svg>
    </div>
    Подписаться
    <svg icon="subscribe" class="svg16"></svg>
  </button>
}
