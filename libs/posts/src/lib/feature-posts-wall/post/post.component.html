@if (post(); as post) {
  <tt-avatar-circle [avatarUrl]="post.author.avatarUrl" [defaultAvatarUrl]="defaultAvatarUrl()"></tt-avatar-circle>

  <main class="post-body small-text">
    <div class="post-header">
      <strong class="post-author bold">{{ post.author.name }}</strong>
      <span class="post-created-at ml8">{{ post.createdAt | dateDiff }}</span>
    </div>
    <div [innerHTML]="post.content | sanitize" class="post-content" ttHtmlLinkClick></div>

    <div class="post-counters">
    <span class="post-counter">
      <svg icon="messages" class="svg16"></svg>
      <span>{{ comments().length }}</span>
    </span>
      <span class="post-counter">
      <svg icon="likes" class="svg16"></svg>
      <span>{{ post.likes }}</span>
    </span>
    </div>

    <div class="post__comments-wrapper scrollbar" #commentsContainer>
      @for (comment of comments(); track comment.id) {
        <tt-comment [comment]="comment"></tt-comment>
      }
    </div>

    <tt-message-input
      (created)="onCreatedComment($event)"
      placeholder="Напишите комментарий"
      class="border-dashed"
    ></tt-message-input>
  </main>
}
