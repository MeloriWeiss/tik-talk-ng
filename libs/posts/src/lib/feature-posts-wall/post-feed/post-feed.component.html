@if (canCreatePosts()) {
  <tt-message-input
    ttTrackMessage
    [avatarUrl]="avatarUrl()"
    [defaultAvatarUrl]="defaultAvatarUrl()"
    (created)="onCreatePost($event)"
    placeholder="Напишите что-нибудь"
    class="message-input emojis-bottom"
  ></tt-message-input>
}

<div class="posts-wrapper">
  @for (post of posts(); track post.id) {
    <tt-post
      [post]="post"
      [defaultAvatarUrl]="defaultAvatarUrl()"
    ></tt-post>
  }
</div>
