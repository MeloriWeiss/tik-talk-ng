@if (profile$ | async; as profile) {
  <header class="profile-page__header">
    <tt-profile-header [profile]="profile"></tt-profile-header>
    @if (isMyPage()) {
      <a class="btn to-settings-btn" routerLink="/settings">
        Редактировать
        <svg icon="settings" class="to-settings-icon"></svg>
      </a>
    } @else {
      <button class="btn to-chats-btn" (click)="sendMessage(profile.id)">
        Написать
        <svg icon="messages" class="to-settings-icon"></svg>
      </button>
    }
  </header>
  <main class="profile-page__body">
    <tt-post-feed
      ttScrollBlock
      [bottomPaddingSize]="2"
      [posts]="posts()"
      [avatarUrl]="profile.avatarUrl"
      (createdPost)="createPost($event)"
      class="scrollbar scroll-hidden"
    ></tt-post-feed>

    <aside class="aside-info">
      <tt-subscribers-block [subscribers]="subscribers$ | async"></tt-subscribers-block>

      <tt-labeled-tags [tags]="profile.stack"></tt-labeled-tags>

      <tt-labeled-text [text]="profile.description"></tt-labeled-text>
    </aside>
  </main>
}
