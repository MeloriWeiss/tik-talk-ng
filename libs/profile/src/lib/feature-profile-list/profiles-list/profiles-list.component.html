<div class="profile-cards__wrapper scrollbar wide-scrollbar" ttScrollBlock>
  @for (profile of profiles(); track profile.id; let last = $last) {
    <tt-profile-card [profile]="profile"></tt-profile-card>
    @if (last && profiles().length < totalCount()) {
      @defer (on viewport) {
        <tt-infinite-scroll-trigger
          (loaded)="fetchProfiles()"
        ></tt-infinite-scroll-trigger>
      } @placeholder {
        <div></div>
      }
    }
  }
  @if (profiles().length < totalCount()) {
    <tt-loader></tt-loader>
  }
</div>

<tt-sidebar-portal>
  <div class="profiles-count">Найдено профилей: {{ totalCount() }}</div>
</tt-sidebar-portal>
