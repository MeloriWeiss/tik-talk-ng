<tt-profile-header></tt-profile-header>

<form class="profile-search-form" [formGroup]="searchForm">
  <tt-labeled-form-field-wrapper label="Имя">
    <tt-form-input formControlName="firstName">
      <svg icon="search" class="search-input-icon svg18" rightIcon></svg>
    </tt-form-input>
  </tt-labeled-form-field-wrapper>

  <tt-labeled-form-field-wrapper label="Фамилия">
    <tt-form-input formControlName="lastName">
      <svg icon="search" class="search-input-icon svg18" rightIcon></svg>
    </tt-form-input>
  </tt-labeled-form-field-wrapper>

  <tt-labeled-form-field-wrapper label="Город">
    <tt-form-input formControlName="city">
      <svg icon="search" class="search-input-icon svg18" rightIcon></svg>
    </tt-form-input>
  </tt-labeled-form-field-wrapper>

  <tt-labeled-form-field-wrapper label="Навыки">
    <tt-form-input formControlName="stack">
      <svg icon="search" class="search-input-icon svg18" rightIcon></svg>
    </tt-form-input>
  </tt-labeled-form-field-wrapper>
</form>
