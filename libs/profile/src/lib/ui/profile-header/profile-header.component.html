@if (profile(); as profile) {
  <tt-editable-avatar-circle
    [canEdit]="isMyPage()"
    (fileLoaded)="onFileLoaded($event)"
  >
    <tt-avatar-circle
      avatar
      class="size112"
      [avatarUrl]="profile.avatarUrl"
    ></tt-avatar-circle>
    <tt-change-photo-tooltip
      tooltip
      class="mt5"
    ></tt-change-photo-tooltip>
  </tt-editable-avatar-circle>

  <div class="username-and-name">
    <h1 class="h4 mb4">{{ profile.firstName }} {{ profile.lastName }}</h1>
    <span class="regular">{{ profile.username }}</span>
  </div>
}
