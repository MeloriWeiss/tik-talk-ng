@if (profile(); as profile) {
  <tt-avatar-circle [avatarUrl]="profile.avatarUrl"></tt-avatar-circle>
}

<tt-main-textarea
  [placeholder]="placeholder()"
  [formControl]="textareaControl"
  rows="1"
></tt-main-textarea>

<div class="emojis" [class.opened]="isEmojiOpened">
  <tt-popup-wrapper class="emoji-rows" (click)="onClickSmile($event)">
    <div class="emoji-row">
      <span>😃</span>
      <span>😁</span>
      <span>😅</span>
      <span>🤣</span>
      <span>😉</span>
    </div>
    <div class="emoji-row">
      <span>😊</span>
      <span>😇</span>
      <span>😲</span>
      <span>🥰</span>
      <span>😳</span>
    </div>
    <div class="emoji-row">
      <span>😥</span>
      <span>😍</span>
      <span>😘</span>
      <span>😜</span>
      <span>🤤</span>
    </div>
  </tt-popup-wrapper>
  <svg
    icon="emojis"
    class="emojis-icon svg16 no-select"
    (click)="onOpenEmojiList()"
  ></svg>
</div>

<button class="btn btn-icon" (click)="onCreate()">
  <svg icon="send-message" class="svg16"></svg>
</button>
