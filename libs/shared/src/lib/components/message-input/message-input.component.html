@if (hasAvatar()) {
  <tt-avatar-circle [avatarUrl]="messageAvatarUrl()" [defaultAvatarUrl]="defaultAvatarUrl()"></tt-avatar-circle>
}

<tt-main-textarea
  [placeholder]="placeholder()"
  [formControl]="textareaControl"
  rows="1"
></tt-main-textarea>

<div class="emojis" [class.opened]="isEmojiOpened">
  <button
    (click)="onClickSmile($event)"
    class="emoji-rows popup-wrapper"
    type="button"
  >
    <div class="emoji-row">
      <span>😃</span>
      <span>😁</span>
      <span>😅</span>
      <span>🤣</span>
      <span>😉</span>
    </div>
    <div class="emoji-row">
      <span>😊</span>
      <span>😇</span>
      <span>😲</span>
      <span>🥰</span>
      <span>😳</span>
    </div>
    <div class="emoji-row">
      <span>😥</span>
      <span>😍</span>
      <span>😘</span>
      <span>😜</span>
      <span>🤤</span>
    </div>
  </button>
  <button
    type="button"
    class="non-visible-btn"
    (click)="onOpenEmojiList()"
  >
    <svg
      icon="emojis"
      class="emojis-icon svg16 no-select"
    ></svg>
  </button>
</div>

@if (hasSendBtn()) {
  <button class="btn btn-icon" (click)="onCreate()">
    <svg icon="send-message" class="svg16"></svg>
  </button>
}
