@if (subscriber(); as subscriber) {
  <a
    #anchor
    [routerLink]="['/profile', subscriber.id]"
  >
    <tt-avatar-circle
      [avatarUrl]="subscriber.avatarUrl"
      class="size36"
    ></tt-avatar-circle>
  </a>

  @if (isMouseOver()) {
    <tt-portal [host]="anchor">
      <div class="popup-wrapper">
        {{ subscriber.firstName }}
      </div>
    </tt-portal>
  }
}
