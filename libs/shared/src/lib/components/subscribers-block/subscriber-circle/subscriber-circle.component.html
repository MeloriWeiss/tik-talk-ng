@if (subscriber(); as subscriber) {
  <button
    (click)="onAvatarClick()"
    #icon
    class="avatar-wrapper"
    type="button"
  >
    <tt-avatar-circle
      [avatarUrl]="subscriber.avatarUrl"
      class="size36"
    ></tt-avatar-circle>
  </button>

  @if (isMouseOver()) {
    <tt-portal [host]="icon">
      <div class="popup-wrapper">
        {{ subscriber.firstName }}
      </div>
    </tt-portal>
  }
}
