<button
  class="tt-form-input tt-form-input__with-icon select-header no-select scrollbar"
  [class.active]="isDropdownOpened()"
  (click)="toggleDropdown()"
  [disabled]="disabled()"
  type="button"
  #selectHeader
>
  @if (value(); as value) {
    @if (!value.length) {
      <div class="select-placeholder">Выберите</div>
    }
    @for (selectedOption of value; track selectedOption.value; let i = $index) {
      <button
        class="badge-tag deletable"
        type="button"
      >
        <button (click)="deleteOption($event, selectedOption.value)" type="button" class="badge-tag__delete">
          <svg icon="cross" class="svg11"></svg>
        </button>
        {{ selectedOption.name }}
      </button>
    }
  }
</button>

<div class="control-value-error">
  <ng-content select="[errorMessage]"></ng-content>
</div>

@if (isDropdownOpened()) {
  <tt-portal [host]="selectHeader" [width]="elementWidth()">
    <tt-multi-select-dropdown
      (ttClickOut)="closeDropdown()"
    >
      <ng-content></ng-content>
    </tt-multi-select-dropdown>
  </tt-portal>
}
