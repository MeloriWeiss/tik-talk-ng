@if (option(); as option) {
  <button
    class="option-btn"
    type="button"
    (click)="onToggleOption(option)"
    [class.selected]="option.selected"
  >
    <span class="option-btn__inner-wrapper">
      <span class="badge-tag">
        {{ option.name }}
      </span>
      @if (option.selected) {
        <svg icon="check-mark" class="selected-icon svg18"></svg>
      }
    </span>
  </button>
}
